name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run check-types

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: cd apps/web && bun run build

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only build and push the image on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [type-check, build]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up BuildKit with layer caching backed by GHCR
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Main app image ────────────────────────────────────────────────────
      - name: Docker metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/app
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/app:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/app:cache,mode=max

      # ── Docs image ────────────────────────────────────────────────────────
      - name: Docker metadata (docs)
        id: meta-docs
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/docs
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: docs-runner
          push: true
          tags: ${{ steps.meta-docs.outputs.tags }}
          labels: ${{ steps.meta-docs.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/docs:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/docs:cache,mode=max

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/docker/client-portals/ndma-dcs

            # Authenticate with GHCR using the workflow's GITHUB_TOKEN
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images and restart services
            docker compose pull app docs
            docker compose up -d --no-build app docs

            # Run DB migrations non-interactively
            docker compose exec -T app bun run db:push

            # Cleanup dangling images
            docker image prune -f
